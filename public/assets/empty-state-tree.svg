<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Constellation of dim, unconnected nodes -->
  <!-- Center node (starting point, slightly brighter) -->
  <circle cx="100" cy="100" r="8" fill="none" stroke="#4A7CFF" stroke-width="2" opacity="0.4" />
  <circle cx="100" cy="100" r="3" fill="#4A7CFF" opacity="0.4" />

  <!-- Surrounding locked nodes -->
  <circle cx="60" cy="60" r="6" fill="none" stroke="#2A3150" stroke-width="2" stroke-dasharray="3 3" />
  <circle cx="140" cy="60" r="6" fill="none" stroke="#2A3150" stroke-width="2" stroke-dasharray="3 3" />
  <circle cx="50" cy="120" r="6" fill="none" stroke="#2A3150" stroke-width="2" stroke-dasharray="3 3" />
  <circle cx="150" cy="120" r="6" fill="none" stroke="#2A3150" stroke-width="2" stroke-dasharray="3 3" />
  <circle cx="100" cy="40" r="6" fill="none" stroke="#2A3150" stroke-width="2" stroke-dasharray="3 3" />
  <circle cx="100" cy="160" r="6" fill="none" stroke="#2A3150" stroke-width="2" stroke-dasharray="3 3" />
  <circle cx="40" cy="90" r="5" fill="none" stroke="#2A3150" stroke-width="2" stroke-dasharray="3 3" />
  <circle cx="160" cy="90" r="5" fill="none" stroke="#2A3150" stroke-width="2" stroke-dasharray="3 3" />

  <!-- Dim connection lines -->
  <line x1="100" y1="100" x2="60" y2="60" stroke="#2A3150" stroke-width="1" opacity="0.3" />
  <line x1="100" y1="100" x2="140" y2="60" stroke="#2A3150" stroke-width="1" opacity="0.3" />
  <line x1="100" y1="100" x2="50" y2="120" stroke="#2A3150" stroke-width="1" opacity="0.3" />
  <line x1="100" y1="100" x2="150" y2="120" stroke="#2A3150" stroke-width="1" opacity="0.3" />
  <line x1="100" y1="100" x2="100" y2="40" stroke="#2A3150" stroke-width="1" opacity="0.3" />
  <line x1="100" y1="100" x2="100" y2="160" stroke="#2A3150" stroke-width="1" opacity="0.3" />

  <!-- "Begin your journey" text -->
  <text x="100" y="185" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="#8892A8" text-anchor="middle">Take the quiz to forge your path</text>
</svg>
